name: Deploy (Test)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS deps & build
        run: |
          npm ci
          npm run build

      # Copy everything except vendor/node_modules/storage/.env and public/build (we upload that next)
      - name: Copy repo to server (rsync)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >
            -az --delete
            --exclude=".git" --exclude="node_modules" --exclude="vendor" --exclude=".github" --exclude="tests"
            --exclude=".env" --exclude=".env.*"
            --exclude="storage/**" --exclude="public/storage"
            --exclude="public/build/**"
          path: .
          remote_path: ${{ secrets.TEST_PATH }}
          remote_host: ${{ secrets.TEST_SSH_HOST }}
          remote_user: ${{ secrets.TEST_SSH_USER }}
          remote_port: ${{ secrets.TEST_SSH_PORT }}
          remote_key: ${{ secrets.TEST_SSH_KEY }}

      # Upload only the compiled assets (built in CI)
      - name: Upload built assets
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -az
          path: public/build/
          remote_path: ${{ secrets.TEST_PATH }}/public/build
          remote_host: ${{ secrets.TEST_SSH_HOST }}
          remote_user: ${{ secrets.TEST_SSH_USER }}
          remote_port: ${{ secrets.TEST_SSH_PORT }}
          remote_key: ${{ secrets.TEST_SSH_KEY }}

      - name: Remote composer + artisan (no sudo)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.TEST_SSH_HOST }}
          username: ${{ secrets.TEST_SSH_USER }}
          key: ${{ secrets.TEST_SSH_KEY }}
          port: ${{ secrets.TEST_SSH_PORT }}
          script: |
            set -euo pipefail
            umask 002
            APP_PATH="${{ secrets.TEST_PATH }}"
            cd "$APP_PATH"

            # Guard: require .env on the server
            if [ ! -f .env ]; then
              echo "::error::.env is missing at $APP_PATH/.env; refusing to deploy."
              exit 1
            fi

            # Ensure writable dirs exist and are group-writable by www-data
            mkdir -p storage/framework/{cache,views,sessions} bootstrap/cache
            # Change group to www-data (deploy must be in www-data group)
            chgrp -R www-data storage bootstrap/cache || true
            chmod -R 2775 storage bootstrap/cache
            find storage bootstrap/cache -type f -exec chmod 664 {} \;

            php -v
            composer install --no-dev --prefer-dist --optimize-autoloader

            # DB + caches
            php artisan migrate --force
            php artisan storage:link || true

            # Clear stale caches and force the compiled views path for this run
            export VIEW_COMPILED_PATH="$APP_PATH/storage/framework/views"
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # NOTE: no sudo/systemctl reload here. If opcache is aggressive,
            # either enable opcache.validate_timestamps=1 on the test box,
            # or grant limited sudo for 'systemctl reload php-fpm' only.
